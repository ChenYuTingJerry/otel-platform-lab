## sample-api Service (Step 2d). ClusterIP, in-cluster only. Traffic for the
## end-to-end trace check (Step 2e) hits this on port 80.
apiVersion: v1
kind: Service
metadata:
  name: sample-api
  namespace: demo
  labels:
    app: sample-api
spec:
  selector:
    app: sample-api
  ports:
    - name: http
      port: 80
      targetPort: 8000
