## ArgoCD Helm values used by `make argocd` (bootstrap only).
## Argo does not manage its own install; everything else is managed via
## Application CRs.

## Expose the Argo server on host localhost:8081 via k3d port mapping to
## NodePort 30080. TLS is off so we can hit http://localhost:8081 directly.
server:
  service:
    type: NodePort
    nodePortHttp: 30080

configs:
  params:
    server.insecure: "true"

## Keep the local footprint small. We use the local admin account only, so
## dex (the SSO/OIDC bridge) is off, and we send no alerts, so the
## notifications controller is off. Both toggles are valid keys in this chart
## and take effect (no dex or notifications pod is created).
## Note: the argo-cd chart has no `applicationSet.enabled` key, so the
## ApplicationSet controller stays running. We do not try to disable it.
notifications:
  enabled: false
dex:
  enabled: false
