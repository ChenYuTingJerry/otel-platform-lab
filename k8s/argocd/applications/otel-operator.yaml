## Argo Application: OpenTelemetry Operator (Step 2a).
## Multi-source, same pattern as Grafana: the chart repo plus this Git repo
## ($values) for values.yaml. sync-wave 0 so it comes up before the Collector
## CR (wave 2), which needs the operator's CRDs to exist first.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: otel-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: opentelemetry-operator-system
  sources:
    - repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
      chart: opentelemetry-operator
      targetRevision: 0.118.0
      helm:
        releaseName: opentelemetry-operator
        valueFiles:
          - $values/k8s/manifests/otel-operator/values.yaml
    - repoURL: https://github.com/ChenYuTingJerry/otel-platform-lab
      targetRevision: main
      ref: values
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
