## Argo Application: Tempo (Step 2b), the traces backend.
##
## Single-binary mode, same multi-source shape as Grafana and the operator:
##   source 0 - the Tempo Helm chart
##   source 1 - this Git repo as `$values`, for values.yaml
##   source 2 - this Git repo again, rendering the raw Grafana datasource
##              ConfigMap under k8s/manifests/tempo/datasource/. The Tempo
##              chart has no extraObjects hook, so the datasource ships as its
##              own directory source instead of being baked into the chart.
##
## The chart comes from grafana-community, not grafana: the old
## grafana/tempo chart is deprecated and frozen (see docs/adr/008).
##
## sync-wave 1: after the operator (wave 0), before the Collector (wave 2),
## which exports to this Tempo.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tempo
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  sources:
    - repoURL: https://grafana-community.github.io/helm-charts
      chart: tempo
      targetRevision: 2.2.3
      helm:
        releaseName: tempo
        valueFiles:
          - $values/k8s/manifests/tempo/values.yaml
    - repoURL: https://github.com/ChenYuTingJerry/otel-platform-lab
      targetRevision: main
      ref: values
    - repoURL: https://github.com/ChenYuTingJerry/otel-platform-lab
      targetRevision: main
      path: k8s/manifests/tempo/datasource
      directory:
        recurse: true
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
