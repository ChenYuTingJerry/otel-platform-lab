## OpenTelemetry Operator Helm values, read by Argo through the Application CR.
##
## The operator provides two CRDs we use:
##   - OpenTelemetryCollector (Step 2c: the Collector runs as a CR)
##   - Instrumentation        (Step 2d: zero-code auto-instrumentation)
## and a mutating webhook that injects instrumentation into annotated pods.

## The webhook needs a TLS cert, and the webhook caBundle must stay the CA that
## signed it. cert-manager issues that cert, rotates it, and keeps the caBundle
## in sync through its CA injector (the webhook carries a
## `cert-manager.io/inject-ca-from` annotation, no caBundle in git).
##
## We do NOT use the chart's autoGenerateCert. It regenerates a random cert on
## every Helm render, so under Argo the Secret and the webhook caBundle come
## from different renders and drift apart, which breaks injection silently. See
## docs/adr/016, which supersedes docs/adr/005.
admissionWebhooks:
  certManager:
    enabled: true
  autoGenerateCert:
    enabled: false

## Keep the operator light for local k3d.
manager:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
