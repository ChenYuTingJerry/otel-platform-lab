## Instrumentation CR (Step 2d): the Python auto-instrumentation template.
##
## The OTel Operator installs the Instrumentation CRD but no instances (see
## docs/adr/010). This is the first instance we author. It runs nothing on its
## own; it sits in the app namespace and waits for a pod annotation
## (instrumentation.opentelemetry.io/inject-python) to reference it. The webhook
## then injects a Python SDK init-container into that pod.
##
## Namespace demo, not observability: injection templates must live in the
## namespace of the target app pods (docs/adr/010).
apiVersion: opentelemetry.io/v1alpha1
kind: Instrumentation
metadata:
  name: python
  namespace: demo
spec:
  ## Export to the Collector, the single ingress. Not to Tempo (docs/adr/002).
  ## Python auto-instrumentation talks OTLP over HTTP, so this is the
  ## Collector's 4318 port; OTEL_EXPORTER_OTLP_PROTOCOL below matches.
  exporter:
    endpoint: http://otel-collector.observability.svc.cluster.local:4318
  propagators:
    - tracecontext
    - baggage
  ## Sample everything: this is a lab, and we want the one test trace kept.
  sampler:
    type: parentbased_traceidratio
    argument: "1"
  python:
    env:
      - name: OTEL_EXPORTER_OTLP_PROTOCOL
        value: http/protobuf
      ## Logs (Step 3). Export the app's Python logging records as OTLP, and
      ## turn on the logging auto-instrumentation so each record is stamped
      ## with the active trace_id. Same Collector endpoint as traces.
      - name: OTEL_LOGS_EXPORTER
        value: otlp
      - name: OTEL_PYTHON_LOGGING_AUTO_INSTRUMENTATION_ENABLED
        value: "true"
      ## Metrics (Step 4). The Collector now has a metrics pipeline that exports
      ## to Mimir, so the SDK's OTLP metrics export has somewhere to land. In
      ## Step 3 this was `none`, because without that pipeline every export
      ## interval produced a 404 and an error line. Same Collector endpoint as
      ## traces and logs.
      ##
      ## This turns on the direct metrics path: the auto-instrumentation's HTTP
      ## server metrics, plus the app's own `dice.rolls` counter. The other
      ## metrics path, RED metrics derived from spans, needs nothing here: the
      ## Collector's span_metrics connector builds it from the traces we already
      ## send (docs/adr/015).
      - name: OTEL_METRICS_EXPORTER
        value: otlp
      ## Do not trace the readiness/liveness probe. The kubelet hits /healthz
      ## every few seconds, which floods Tempo with low-value spans and buries
      ## real traffic. Pod health is observed through k8s probes and metrics,
      ## not through traces of the health endpoint. Exclude it at the source so
      ## the span is never created (cheaper than dropping it at the Collector).
      - name: OTEL_PYTHON_EXCLUDED_URLS
        value: healthz
