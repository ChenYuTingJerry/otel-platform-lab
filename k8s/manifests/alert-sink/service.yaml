## alert-sink Service (Step 5c). ClusterIP, in-cluster only. The Mimir
## Alertmanager posts alerts to http://alert-sink.observability.svc.cluster.local:8080/,
## so the service port matches the container port 8080.
apiVersion: v1
kind: Service
metadata:
  name: alert-sink
  namespace: observability
  labels:
    app: alert-sink
spec:
  selector:
    app: alert-sink
  ports:
    - name: http
      port: 8080
      targetPort: 8080
