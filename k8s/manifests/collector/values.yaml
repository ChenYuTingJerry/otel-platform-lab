## OpenTelemetry Collector Helm values, read by Argo through the collector
## Application CR. This is the single telemetry ingress for Step 2c.
##
## Gateway topology: one central Deployment behind a Service. Apps send OTLP
## here; the Collector is the only thing that talks to a backend (see ADR 002
## and ADR 009). Not the operator CR: a gateway needs none of the operator-only
## features (sidecar injection), so it ships as its own chart like Tempo and
## Grafana.
##
## sync-wave 2: after the operator CRDs (wave 0) and Tempo (wave 1).

## Central gateway, not a per-node DaemonSet or per-pod sidecar.
mode: deployment

## Clean names: Deployment, Service and ConfigMap all become "otel-collector"
## instead of the chart's "otel-collector-opentelemetry-collector".
fullnameOverride: otel-collector

replicaCount: 1

## The k8s distro carries the components we use (otlp, memory_limiter, resource,
## batch) and, as of Step 4, the span_metrics connector and the otlp_http
## exporter too. So metrics need no contrib image either. (The k8s distro does
## drop prometheusremotewrite, but we push OTLP to Mimir, not remote-write. See
## docs/adr/014.)
image:
  repository: otel/opentelemetry-collector-k8s

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 256Mi

presets:
  ## k8sattributes needs a ClusterRole to watch pods. Deferred to a later step
  ## (added with the sample app), so keep it off here.
  kubernetesAttributes:
    enabled: false

## Step 6a: platform self-health. The k8s_cluster receiver (added below) watches
## the API server for workload state, which needs cluster-wide read RBAC. The
## chart's serviceAccount (created by default) gets this ClusterRole bound to it.
## These are the standard k8s_cluster read rules from the receiver's docs, trimmed
## to what we watch (workloads + nodes + namespaces + quotas + HPAs). No write
## verbs: the receiver only lists and watches.
clusterRole:
  create: true
  rules:
    - apiGroups: [""]
      resources:
        - events
        - namespaces
        - namespaces/status
        - nodes
        - nodes/spec
        - pods
        - pods/status
        - replicationcontrollers
        - replicationcontrollers/status
        - resourcequotas
        - services
      verbs: [get, list, watch]
    - apiGroups: [apps]
      resources: [daemonsets, deployments, replicasets, statefulsets]
      verbs: [get, list, watch]
    - apiGroups: [extensions]
      resources: [daemonsets, deployments, replicasets]
      verbs: [get, list, watch]
    - apiGroups: [batch]
      resources: [jobs, cronjobs]
      verbs: [get, list, watch]
    - apiGroups: [autoscaling]
      resources: [horizontalpodautoscalers]
      verbs: [get, list, watch]

## The chart opens Jaeger and Zipkin ports on the Service by default. We only
## accept OTLP, so disable them. OTLP gRPC (4317) and HTTP (4318) stay on.
ports:
  jaeger-compact:
    enabled: false
  jaeger-thrift:
    enabled: false
  jaeger-grpc:
    enabled: false
  zipkin:
    enabled: false

## Collector pipeline. The chart deep-merges this over its defaults, which ship
## logs/metrics/traces pipelines with a debug exporter and jaeger/zipkin/
## prometheus receivers. We set the unwanted defaults to null to drop them, so
## the effective config is OTLP-in, and Tempo/Loki/Mimir out.
config:
  receivers:
    jaeger: null
    zipkin: null
    prometheus: null
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
    ## Step 6a: platform self-health. A single cluster-wide receiver that watches
    ## the API server and emits workload state as OTLP metrics: k8s_deployment_
    ## available/desired, k8s_statefulset_ready_pods/desired_pods, k8s_container_
    ## restarts, k8s_pod_phase, and so on. This is the OTLP-native way to watch
    ## "is every service healthy" without scraping: no kube-state-metrics, no
    ## Prometheus receiver. It replaces kube-state-metrics for our needs.
    ##
    ## It is cluster-wide (not node-local), so it fits the existing single gateway
    ## Deployment and needs no DaemonSet. Node-local receivers (host_metrics,
    ## kubelet_stats) would need a DaemonSet agent tier; that is deferred (ADR 009
    ## revisit trigger, ADR 018). RBAC for this receiver is the clusterRole above.
    k8s_cluster:
      collection_interval: 30s
      node_conditions_to_report: [Ready, MemoryPressure]
      allocatable_types_to_report: [cpu, memory]
  processors:
    ## memory_limiter first: under memory pressure it refuses data so
    ## backpressure reaches the receiver, instead of the pod being OOM-killed.
    memory_limiter:
      check_interval: 1s
      limit_percentage: 80
      spike_limit_percentage: 25
    ## Static enrichment. A cheap example of the central enrichment ADR 002
    ## puts on the Collector. k8s attributes come later with the preset above.
    resource:
      attributes:
        - key: deployment.environment
          value: lab
          action: upsert
    batch: {}
  ## Connectors join two pipelines: they consume from one and emit into another.
  ## span_metrics is an exporter on the traces pipeline and a receiver on the
  ## metrics pipeline (Step 4). One span stream therefore feeds both Tempo (the
  ## trace itself) and Mimir (the aggregate), with no app-side change. This is
  ## the RED-metrics path in docs/adr/015.
  ##
  ## The component id is `span_metrics`, not `spanmetrics`. This collector
  ## renames component types to snake_case (same reason the exporters below are
  ## otlp_grpc / otlp_http, not otlp / otlphttp).
  connectors:
    span_metrics:
      ## Metric names come out as traces_span_metrics_calls_total and
      ## traces_span_metrics_duration_milliseconds_* once Mimir translates them.
      namespace: traces.span.metrics
      histogram:
        explicit:
          ## A short bucket list on purpose. Every bucket is a series per label
          ## set, so buckets are a cardinality knob. These span a local API's
          ## realistic range.
          buckets: [5ms, 10ms, 25ms, 50ms, 100ms, 250ms, 500ms, 1s, 2500ms, 5s]
      ## Extra labels on top of the connector's defaults (service.name,
      ## span.name, span.kind, status.code).
      ##
      ## These are the *legacy* HTTP semconv keys, which is what the injected
      ## Python auto-instrumentation actually emits today (verified on a real
      ## span). The new-style http.request.method / http.response.status_code
      ## are not present, so naming those here would produce empty labels.
      ##
      ## http.route is the route template (/rolldice), not the raw path. Raw
      ## paths (http.target, http.url) stay out: they are per-request detail and
      ## belong in traces, not in metric labels.
      dimensions:
        - name: http.method
        - name: http.status_code
        - name: http.route
      ## Temporality is cumulative by default, which is what Mimir wants; it
      ## rejects delta unless explicitly enabled.
  exporters:
    ## Drop the chart's default debug exporter.
    debug: null
    ## Traces to Tempo over OTLP gRPC. Type is otlp_grpc, not the old otlp
    ## alias, which the current Collector deprecates.
    otlp_grpc/tempo:
      endpoint: tempo.observability.svc.cluster.local:4317
      tls:
        insecure: true
    ## Logs to Loki via its native OTLP endpoint (Step 3). otlp_http appends
    ## /v1/logs to this base. Type is otlp_http, not the old otlphttp alias.
    ## Apps never address Loki: they send logs as OTLP to this Collector, which
    ## is the only thing that talks to the backend (see ADR 002 and ADR 012).
    otlp_http/loki:
      endpoint: http://loki.observability.svc.cluster.local:3100/otlp
      tls:
        insecure: true
    ## Metrics to Mimir over OTLP (Step 4). otlp_http appends /v1/metrics to
    ## this base, which is exactly the route mimir-gateway's nginx exposes.
    ## mimir-gateway is Mimir's own front door, not to be confused with this
    ## Collector, which is a gateway in the collector-topology sense
    ## (docs/adr/009 and docs/adr/013). We push OTLP rather than Prometheus
    ## remote-write, to keep one protocol out of the Collector (docs/adr/014).
    otlp_http/mimir:
      endpoint: http://mimir-gateway.observability.svc.cluster.local/otlp
      tls:
        insecure: true
  service:
    pipelines:
      ## Traces go to Tempo, and the same spans feed the span_metrics connector,
      ## which turns them into RED metrics for the metrics pipeline below.
      traces:
        receivers: [otlp]
        processors: [memory_limiter, resource, batch]
        exporters: [otlp_grpc/tempo, span_metrics]
      ## Logs ride the same OTLP-in path as traces. The resource processor
      ## enriches them too, so logs also carry deployment.environment=lab.
      logs:
        receivers: [otlp]
        processors: [memory_limiter, resource, batch]
        exporters: [otlp_http/loki]
      ## Metrics have three sources:
      ##   otlp         - the app's own SDK metrics, the direct path (Step 4)
      ##   span_metrics - RED metrics derived from the traces pipeline above (Step 4)
      ##   k8s_cluster  - workload health from the API server (Step 6a)
      ## All get the resource processor, so metrics carry deployment.environment=
      ## lab like traces and logs do. The k8s_cluster metrics also carry namespace/
      ## workload/pod identity, but those are OTLP resource attributes; Mimir keeps
      ## them out of labels unless promoted, so the identity is surfaced by
      ## promote_otel_resource_attributes in the Mimir values (see docs/adr/018).
      metrics:
        receivers: [otlp, span_metrics, k8s_cluster]
        processors: [memory_limiter, resource, batch]
        exporters: [otlp_http/mimir]
