## Grafana Helm values, read by Argo through the Grafana Application CR.

## Service is exposed via NodePort 30300, mapped to host localhost:3000 by
## k3d cluster port mapping.
service:
  type: NodePort
  port: 80
  targetPort: 3000
  nodePort: 30300
  portName: http

## Lab-only credentials. Not a real secret; documented in README.
adminUser: admin
adminPassword: otel-lab-admin

## No persistence for the lab. Losing dashboards on pod restart is fine.
persistence:
  enabled: false

## Datasources arrive one at a time as each backend comes online: Tempo
## (Step 2b), Loki (Step 3), Mimir (Step 4). Rather than list them here, we
## let each backend ship its own. The datasource sidecar (a plain container,
## not a CRD) watches for ConfigMaps labelled `grafana_datasource` in this
## namespace and loads them at runtime. See docs/adr/007.
sidecar:
  datasources:
    enabled: true
    label: grafana_datasource
    labelValue: "1"
  dashboards:
    enabled: false

## Keep the pod light for local k3d.
resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
